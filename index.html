<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ちゃいんの活動ステータス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --discord-color: #5865F2;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --bpm-red: #ff4757;
            --steps-green: #2ed573;
            --cal-orange: #ffa502;
            --sleep-blue: #3742fa;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        body { 
            background: var(--bg-gradient); 
            display: flex; align-items: center; justify-content: center; 
            color: var(--text-main); 
        }

        .container { width: 90%; max-width: 380px; max-height: 95vh; display: flex; flex-direction: column; justify-content: center; }
        h1 { color: white; font-size: 1.2rem; margin: 0 0 15px 0; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.2); text-align: center; }

        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 28px; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .stat-box { background: #ffffff; padding: 12px 8px; border-radius: 20px; border: 1px solid #edf2f7; text-align: center; }
        .label { font-size: 0.7rem; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 4px; font-weight: 600; }
        .value { font-size: 1.4rem; font-weight: 800; display: block; }
        .unit { font-size: 0.65rem; color: #a0aec0; }

        .bpm-box { grid-column: span 2; padding: 15px 10px; background: linear-gradient(to bottom right, #fffafa, #fff5f6); }
        .bpm-box .value { color: var(--bpm-red); font-size: 3rem; line-height: 1.1; }

        .heart-icon { display: inline-block; animation: pulse 1.2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .steps-box .value { color: var(--steps-green); }
        .cal-box .value { color: var(--cal-orange); }
        .sleep-box { grid-column: span 2; background: linear-gradient(to bottom right, #f8faff, #f0f3ff); }
        .sleep-box .value { color: var(--sleep-blue); font-size: 1.6rem; }
        /* 睡眠時間内の「時間」「分」の文字を少し小さくする */
        .sleep-box .unit-inline { font-size: 0.9rem; margin: 0 4px; font-weight: 600; color: var(--sleep-blue); }

        .notify-btn {
            margin-top: 15px; width: 100%; padding: 14px; border: none; border-radius: 18px; 
            background: var(--discord-color); color: white; font-size: 0.95rem; font-weight: 800; 
            cursor: pointer; box-shadow: 0 8px 15px rgba(88, 101, 242, 0.3); 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .notify-btn:disabled { background: #b2bec3; }

        #time { color: #a0aec0; font-size: 0.7rem; margin-top: 15px; padding-top: 10px; border-top: 1px solid #f1f2f6; text-align: center; }
        .error-log { color: #ff4757; font-size: 0.65rem; text-align: center; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ちゃいんの活動ステータス</h1>
        <div class="card">
            <div class="grid">
                <div class="stat-box bpm-box">
                    <span class="label"><span class="heart-icon">💓</span> 心拍数</span>
                    <span id="bpm" class="value">--</span>
                    <span class="unit">BPM</span>
                </div>
                <div class="stat-box steps-box">
                    <span class="label">👟 歩数</span>
                    <span id="steps" class="value">--</span>
                    <span class="unit">歩</span>
                </div>
                <div class="stat-box cal-box">
                    <span class="label">🔥 燃焼</span>
                    <span id="calories" class="value">--</span>
                    <span class="unit">kcal</span>
                </div>
                <div class="stat-box sleep-box">
                    <span class="label">😴 睡眠時間</span>
                    <span id="sleep" class="value">--</span>
                    </div>
            </div>
            <button id="notifyBtn" class="notify-btn" onclick="sendDiscordNotification()">
                <span>🔔</span> 叩き起こす
            </button>
            <div id="time">更新待ち...</div>
            <div id="debug" class="error-log"></div>
        </div>
    </div>

    <script>
        const part1 = "Rm_mZy9B5N-DEFTElE2rUiG0awvFBJk6oXb9Kxufic09LSvd5g5du17Kgzej-RvnV6Ur";
        const part2 = "https://discord.com/api/webhooks/1498284030922326086/";
        const MY_DISCORD_ID = '922776570597376012'; 

        async function sendDiscordNotification() {
            const btn = document.getElementById('notifyBtn');
            btn.disabled = true;
            btn.innerText = "送信中...";
            const WEBHOOK_URL = part2 + part1;
            const bpm = document.getElementById('bpm').innerText;
            const content = `<@${MY_DISCORD_ID}> 叩き起こされました！\n現在の心拍数: ${bpm} BPM`;

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });
                if (response.ok) {
                    btn.innerText = "✅ 送信成功";
                    setTimeout(() => { btn.disabled = false; btn.innerText = "🔔 叩き起こす"; }, 3000);
                } else { throw new Error(); }
            } catch (e) {
                alert("送信に失敗しました。");
                btn.disabled = false;
                btn.innerText = "🔔 叩き起こす";
            }
        }

        function parseMyDate(dateStr) {
            if (!dateStr || typeof dateStr !== 'string') return null;
            let s = dateStr.includes('/') ? dateStr.replace(/(\d+)\/(\d+)\/(\d+)/, '20$3/$1/$2') : dateStr;
            let d = new Date(s);
            return isNaN(d.getTime()) ? null : d;
        }

        async function update() {
            try {
                const res = await fetch('./data.json?' + new Date().getTime());
                if (!res.ok) throw new Error();
                const text = await res.text();
                const data = JSON.parse(text.replace(/,\s*}/g, '}').replace(/:\s*,/g, ':null,'));
                
                const setVal = (id, val, isRound = false) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    let display = "--";
                    if (val !== undefined && val !== null && val !== "") {
                        display = isRound ? Math.round(val) : val;
                        if (id === 'steps') display = Number(val).toLocaleString();
                    }
                    el.innerText = display;
                };

                setVal('bpm', data.bpm);
                setVal('steps', data.steps);
                setVal('calories', data.calories, true);

                // 心拍数連動アニメーション
                const heartIcon = document.querySelector('.heart-icon');
                if (heartIcon && data.bpm > 0) {
                    const duration = 60 / data.bpm; 
                    heartIcon.style.animationDuration = `${duration}s`;
                }
                
                // 睡眠時間の計算（時間と分に変換）
                if (data.sleep1 && data.sleep2) {
                    const start = parseMyDate(data.sleep1);
                    const end = parseMyDate(data.sleep2);
                    if (start && end) {
                        let diffMs = end - start;
                        if (diffMs < 0) diffMs += 24 * 60 * 60 * 1000; 
                        
                        const totalMinutes = Math.floor(diffMs / (1000 * 60));
                        const h = Math.floor(totalMinutes / 60);
                        const m = totalMinutes % 60;
                        
                        document.getElementById('sleep').innerHTML = 
                            `${h}<span class="unit-inline">時間</span>${m}<span class="unit-inline">分</span>`;
                    }
                } else {
                    setVal('sleep', data.sleep);
                }
                
                if (data.date) {
                    const d = parseMyDate(data.date);
                    document.getElementById('time').innerText = "最終更新: " + (d ? d.toLocaleString('ja-JP') : data.date);
                }
                document.getElementById('debug').innerText = "";
            } catch (e) {
                document.getElementById('debug').innerText = "データ更新を確認中...";
            }
        }

        update();
        setInterval(update, 30000); 
    </script>
</body>
</html>
