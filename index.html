<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ちゃいんの活動ステータス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --discord-color: #5865F2;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --bpm-red: #ff4757;
            --steps-green: #2ed573;
            --cal-orange: #ffa502;
            --sleep-blue: #3742fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh;
            margin: 0; 
            padding: 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main); 
        }

        .container { 
            width: 100%;
            max-width: 400px; 
        }

        h1 { 
            color: white;
            font-size: 1.4rem; 
            margin-bottom: 20px; 
            font-weight: 700; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .card { 
            background: var(--card-bg); 
            padding: 2rem; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); 
            backdrop-filter: blur(10px);
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }

        /* 共通スタイル */
        .stat-box { 
            background: #ffffff; 
            padding: 18px 12px; 
            border-radius: 24px; 
            border: 1px solid #edf2f7;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }

        .label { 
            font-size: 0.75rem; 
            color: var(--text-sub); 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px; 
            font-weight: 600; 
        }

        .value { font-size: 1.6rem; font-weight: 800; display: block; }
        .unit { font-size: 0.7rem; color: #a0aec0; margin-left: 2px; }

        /* 心拍数セクション（特大） */
        .bpm-box { 
            grid-column: span 2; 
            background: linear-gradient(to bottom right, #fffafa, #fff5f6);
            border: 1px solid #ffe0e3;
            padding: 25px 10px;
        }
        .bpm-box .value { 
            color: var(--bpm-red); 
            font-size: 3.5rem; 
            line-height: 1;
        }

        /* アニメーション：鼓動 */
        .heart-icon {
            display: inline-block;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .steps-box .value { color: var(--steps-green); }
        .cal-box .value { color: var(--cal-orange); }
        .sleep-box { 
            grid-column: span 2; 
            background: linear-gradient(to bottom right, #f8faff, #f0f3ff);
            border-color: #e0e4ff;
        }
        .sleep-box .value { color: var(--sleep-blue); }

        /* ボタンデザインの刷新 */
        .notify-btn {
            margin-top: 24px;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            background: var(--discord-color);
            color: white;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .notify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(88, 101, 242, 0.5);
        }

        .notify-btn:active { transform: scale(0.98); }

        #time { 
            color: #a0aec0; 
            font-size: 0.75rem; 
            margin-top: 20px; 
            padding-top: 15px;
            border-top: 1px solid #f1f2f6; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ちゃいんの活動ステータス</h1>
        
        <div class="card">
            <div class="grid">
                <div class="stat-box bpm-box">
                    <span class="label"><span class="heart-icon">💓</span> 心拍数</span>
                    <span id="bpm" class="value">--</span>
                    <span class="unit">BPM</span>
                </div>
                
                <div class="stat-box steps-box">
                    <span class="label">👟 歩数</span>
                    <span id="steps" class="value">--</span>
                    <span class="unit">歩</span>
                </div>

                <div class="stat-box cal-box">
                    <span class="label">🔥 燃焼</span>
                    <span id="calories" class="value">--</span>
                    <span class="unit">kcal</span>
                </div>

                <div class="stat-box sleep-box">
                    <span class="label">😴 睡眠時間</span>
                    <span id="sleep" class="value">--</span>
                    <span class="unit">時間</span>
                </div>
            </div>

            <button id="notifyBtn" class="notify-btn" onclick="sendDiscordNotification()">
                <span>🔔</span> 叩き起こす
            </button>

            <div id="time">更新待ち...</div>
            <div id="debug" class="error-log"></div>
        </div>
    </div>

    <script>
        /* ここに元の script の内容をすべて貼り付け */
        // (webhookのURL分割などのロジックを維持)
    </script>
</body>
</html>
