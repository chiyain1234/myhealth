<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ちゃいんの活動ステータス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: #fdfdfd; padding: 15px; border-radius: 20px; border: 1px solid #f0f0f0; }
        .label { font-size: 0.85rem; color: #888; display: block; margin-bottom: 8px; }
        .value { font-size: 1.6rem; font-weight: bold; }
        .unit { font-size: 0.8rem; margin-left: 4px; color: #999; }
        
        .bpm-box { grid-column: span 2; background: #fff5f6; border-color: #ffe0e3; }
        .bpm-box .value { color: #ff4757; font-size: 2.2rem; }
        .steps-box .value { color: #2ed573; }
        .cal-box .value { color: #ffa502; }
        .resting-box .value { color: #5352ed; }
        .sleep-box .value { color: #3742fa; }

        #time { color: #aaa; font-size: 0.85rem; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .error-log { color: #ff4757; font-size: 0.7rem; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ちゃいんの活動ステータス</h1>
        
        <div class="card">
            <div class="grid">
                <div class="stat-box bpm-box">
                    <span class="label">心拍数</span>
                    <span id="bpm" class="value">--</span><span class="unit">BPM</span>
                </div>
                <div class="stat-box steps-box">
                    <span class="label">今日の歩数</span>
                    <span id="steps" class="value">--</span><span class="unit">歩</span>
                </div>
                <div class="stat-box cal-box">
                    <span class="label">アクティブ消費</span>
                    <span id="calories" class="value">--</span><span class="unit">kcal</span>
                </div>
                <div class="stat-box resting-box">
                    <span class="label">安静時消費</span>
                    <span id="resting" class="value">--</span><span class="unit">kcal</span>
                </div>
                <div class="stat-box sleep-box">
                    <span class="label">睡眠時間</span>
                    <span id="sleep" class="value">--</span><span class="unit">時間</span>
                </div>
            </div>
            <div id="time">更新待ち...</div>
            <div id="debug" class="error-log"></div>
        </div>
    </div>

    <script>
        // 日付文字列をJavaScriptが認識できる形式に変換する関数
        function parseMyDate(dateStr) {
            if (!dateStr || typeof dateStr !== 'string') return null;
            // "4/27/26 19:00:00" -> "2026/04/27 19:00:00"
            let s = dateStr.replace(/(\d+)\/(\d+)\/(\d+)/, '20$3/$1/$2');
            let d = new Date(s);
            return isNaN(d.getTime()) ? null : d;
        }

        async function update() {
            try {
                const res = await fetch('./data.json?' + new Date().getTime());
                if (!res.ok) throw new Error("JSON読み込み失敗");
                
                const text = await res.text();
                const data = JSON.parse(text.replace(/,\s*}/g, '}').replace(/:\s*,/g, ':null,'));
                
                const setVal = (id, val, isRound = false) => {
                    let display = "--";
                    if (val !== undefined && val !== null && val !== "") {
                        display = isRound ? Math.round(val) : val;
                        if (id === 'steps') display = Number(val).toLocaleString();
                    }
                    document.getElementById(id).innerText = display;
                };

                setVal('bpm', data.bpm);
                setVal('steps', data.steps);
                setVal('calories', data.calories, true);
                setVal('resting', data.resting, true);
                
                // --- 睡眠時間の計算ロジック ---
                if (data.sleep1 && data.sleep2) {
                    const start = parseMyDate(data.sleep1);
                    const end = parseMyDate(data.sleep2);
                    
                    if (start && end) {
                        // 差分をミリ秒で取得 -> 時間(h)に変換
                        let diffH = (end - start) / (1000 * 60 * 60);
                        // もし日付を跨いでマイナスになった場合の補正（24時間を足す）
                        if (diffH < 0) diffH += 24; 
                        document.getElementById('sleep').innerText = diffH.toFixed(1);
                    }
                } else {
                    setVal('sleep', data.sleep); // 従来通りの数値（分）が届いた場合
                }
                
                // --- 日付表示 ---
                if (data.date) {
                    const d = parseMyDate(data.date);
                    document.getElementById('time').innerText = "実行時刻: " + 
                        (d ? d.toLocaleString('ja-JP') : data.date);
                }

                document.getElementById('debug').innerText = ""; 
            } catch (e) {
                document.getElementById('debug').innerText = "データ解析中...";
            }
        }

        update();
        setInterval(update, 30000); 
    </script>
</body>
</html>
