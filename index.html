<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ちゃいんの活動ステータス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --discord-color: #5865F2;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 450px; margin: auto; }
        
        .card { 
            background: var(--card-bg); 
            padding: 2rem; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 25px; font-weight: bold; letter-spacing: -0.5px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .stat-box { 
            background: #fdfdfd; 
            padding: 20px 10px; 
            border-radius: 22px; 
            border: 1px solid #f1f2f6;
            transition: transform 0.2s;
        }

        .label { font-size: 0.8rem; color: var(--text-sub); display: block; margin-bottom: 5px; font-weight: 500; }
        .value { font-size: 1.8rem; font-weight: 800; display: block; }
        .unit { font-size: 0.75rem; color: #b2bec3; font-weight: normal; }

        .bpm-box { grid-column: span 2; background: #fff5f6; border-color: #ffe0e3; }
        .bpm-box .value { color: #ff4757; font-size: 2.8rem; }
        .steps-box .value { color: #2ed573; }
        .cal-box .value { color: #ffa502; }
        .sleep-box { grid-column: span 2; background: #f0f3ff; border-color: #e0e4ff; }
        .sleep-box .value { color: #3742fa; }

        .notify-btn {
            margin-top: 25px;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: var(--discord-color);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
            transition: all 0.2s;
        }
        .notify-btn:active { transform: translateY(1px); box-shadow: none; }
        .notify-btn:disabled { background: #b2bec3; cursor: not-allowed; box-shadow: none; }

        #time { color: #b2bec3; font-size: 0.8rem; margin-top: 25px; border-top: 1px solid #f1f2f6; padding-top: 20px; }
        .error-log { color: #ff4757; font-size: 0.7rem; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ちゃいんの活動ステータス</h1>
        
        <div class="card">
            <div class="grid">
                <div class="stat-box bpm-box">
                    <span class="label">💓 心拍数</span>
                    <span id="bpm" class="value">--</span>
                    <span class="unit">BPM</span>
                </div>
                
                <div class="stat-box steps-box">
                    <span class="label">👟 歩数</span>
                    <span id="steps" class="value">--</span>
                    <span class="unit">歩</span>
                </div>

                <div class="stat-box cal-box">
                    <span class="label">🔥 燃焼</span>
                    <span id="calories" class="value">--</span>
                    <span class="unit">kcal</span>
                </div>

                <div class="stat-box sleep-box">
                    <span class="label">😴 睡眠時間</span>
                    <span id="sleep" class="value">--</span>
                    <span class="unit">時間</span>
                </div>
            </div>

            <button id="notifyBtn" class="notify-btn" onclick="sendDiscordNotification()">
                叩き起こす
            </button>

            <div id="time">更新待ち...</div>
            <div id="debug" class="error-log"></div>
        </div>
    </div>

    <script>
        const secretData = "a3R3c3Y6T09nbHZuZnJneS5mbm9PT2RpYnVodm5udm9MMVF6T0RJM05EUXdNemt5TWpNeU5qQTROazlTYlY5dGVXazVRejVPUVVSR1ZGUmxiaVV5Y2xWcEwwZmhkblowUWtwcmRtOXpZbmxMZVhkbVpXMHpWemsxWkhWMTROWG01R00xWkhVMTdaMmR6WldvclVtcHVkVlpWY2c9PQ==";const MY_DISCORD_ID = '922776570597376012'; 

        const WEBHOOK_URL = atob(secretData).split('').map(c => String.fromCharCode(c.charCodeAt(0) - 3)).join('');const MY_DISCORD_ID = '922776570597376012'; 

        async function sendDiscordNotification() {
            const btn = document.getElementById('notifyBtn');
            btn.disabled = true;
            btn.innerText = "送信中...";

            const bpm = document.getElementById('bpm').innerText;
            const content = `<@${MY_DISCORD_ID}> 叩き起こされました！\n現在の心拍数: ${bpm} BPM`;

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });

                if (response.ok) {
                    btn.innerText = "✅ 送信成功";
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerText = "叩き起こす";
                    }, 3000);
                } else { throw new Error(); }
            } catch (e) {
                alert("送信失敗。Webhookの設定を確認してください。");
                btn.disabled = false;
                btn.innerText = "叩き起こす";
            }
        }

        function parseMyDate(dateStr) {
            if (!dateStr || typeof dateStr !== 'string') return null;
            let s = dateStr.replace(/(\d+)\/(\d+)\/(\d+)/, '20$3/$1/$2');
            let d = new Date(s);
            return isNaN(d.getTime()) ? null : d;
        }

        async function update() {
            try {
                const res = await fetch('./data.json?' + new Date().getTime());
                if (!res.ok) throw new Error();
                const text = await res.text();
                const data = JSON.parse(text.replace(/,\s*}/g, '}').replace(/:\s*,/g, ':null,'));
                
                const setVal = (id, val, isRound = false) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    let display = "--";
                    if (val !== undefined && val !== null && val !== "") {
                        display = isRound ? Math.round(val) : val;
                        if (id === 'steps') display = Number(val).toLocaleString();
                    }
                    el.innerText = display;
                };

                setVal('bpm', data.bpm);
                setVal('steps', data.steps);
                setVal('calories', data.calories, true);
                
                if (data.sleep1 && data.sleep2) {
                    const start = parseMyDate(data.sleep1);
                    const end = parseMyDate(data.sleep2);
                    if (start && end) {
                        let diffH = (end - start) / (1000 * 60 * 60);
                        if (diffH < 0) diffH += 24; 
                        document.getElementById('sleep').innerText = diffH.toFixed(1);
                    }
                } else {
                    setVal('sleep', data.sleep);
                }
                
                if (data.date) {
                    const d = parseMyDate(data.date);
                    document.getElementById('time').innerText = "最終更新: " + (d ? d.toLocaleString('ja-JP') : data.date);
                }
                document.getElementById('debug').innerText = "";
            } catch (e) {
                document.getElementById('debug').innerText = "data.jsonの更新を確認中...";
            }
        }

        update();
        setInterval(update, 30000); 
    </script>
</body>
</html>
