<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ちゃいんの活動ステータス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 1.5rem; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: #fdfdfd; padding: 15px; border-radius: 20px; border: 1px solid #f0f0f0; }
        .label { font-size: 0.85rem; color: #888; display: block; margin-bottom: 8px; }
        .value { font-size: 1.6rem; font-weight: bold; }
        .unit { font-size: 0.8rem; margin-left: 4px; color: #999; }
        
        .bpm-box { grid-column: span 2; background: #fff5f6; border-color: #ffe0e3; }
        .bpm-box .value { color: #ff4757; font-size: 2.2rem; }
        .steps-box .value { color: #2ed573; }
        .cal-box .value { color: #ffa502; }
        .resting-box .value { color: #5352ed; }
        .sleep-box .value { color: #3742fa; }

        /* 通知ボタンのスタイル */
        .notify-btn {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: #5865F2; /* Discord色 */
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .notify-btn:active { transform: scale(0.98); }
        .notify-btn:disabled { background: #ccc; cursor: not-allowed; }

        #time { color: #aaa; font-size: 0.85rem; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .error-log { color: #ff4757; font-size: 0.7rem; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ちゃいんの活動ステータス</h1>
        
        <div class="card">
            <div class="grid">
                <div class="stat-box bpm-box"><span class="label">心拍数</span><span id="bpm" class="value">--</span><span class="unit">BPM</span></div>
                <div class="stat-box steps-box"><span class="label">今日の歩数</span><span id="steps" class="value">--</span><span class="unit">歩</span></div>
                <div class="stat-box cal-box"><span class="label">アクティブ消費</span><span id="calories" class="value">--</span><span class="unit">kcal</span></div>
                <div class="stat-box resting-box"><span class="label">安静時消費</span><span id="resting" class="value">--</span><span class="unit">kcal</span></div>
                <div class="stat-box sleep-box"><span class="label">睡眠時間</span><span id="sleep" class="value">--</span><span class="unit">時間</span></div>
            </div>

            <button id="notifyBtn" class="notify-btn" onclick="sendDiscordNotification()">
                叩き起こす
            </button>

            <div id="time">更新待ち...</div>
            <div id="debug" class="error-log"></div>
        </div>
    </div>

    <script>
        const encodedURL = 'aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ5ODI4NDAzMDkyMjMyNjA4Ni9SbV9tWnk5QjVOLURFRlRFbEUyclVpR0BhdnZGQkprNm9YYjlLeHVmaWMwOUxTdmQ1ZzVkdTE3S2d6ZWotUnZuVjZVcg=='
        const WEBHOOK_URL = atob(encodedURL);
        const MY_DISCORD_ID = '922776570597376012'; 

        async function sendDiscordNotification() {
            const btn = document.getElementById('notifyBtn');
            btn.disabled = true;
            btn.innerText = "送信中...";

            const content = `<@${MY_DISCORD_ID}> 叩き起こされました！\n現在の心拍数: ${document.getElementById('bpm').innerText} BPM`;

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });

                if (response.ok) {
                    btn.innerText = "送信完了！";
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerText = "叩き起こす";
                    }, 3000);
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("送信に失敗しました。Webhookの設定を確認してください。");
                btn.disabled = false;
                btn.innerText = "叩き起こす";
            }
        }

        function parseMyDate(dateStr) {
            if (!dateStr || typeof dateStr !== 'string') return null;
            let s = dateStr.replace(/(\d+)\/(\d+)\/(\d+)/, '20$3/$1/$2');
            let d = new Date(s);
            return isNaN(d.getTime()) ? null : d;
        }

        async function update() {
            try {
                const res = await fetch('./data.json?' + new Date().getTime());
                if (!res.ok) throw new Error();
                const text = await res.text();
                const data = JSON.parse(text.replace(/,\s*}/g, '}').replace(/:\s*,/g, ':null,'));
                
                const setVal = (id, val, isRound = false) => {
                    let display = "--";
                    if (val !== undefined && val !== null && val !== "") {
                        display = isRound ? Math.round(val) : val;
                        if (id === 'steps') display = Number(val).toLocaleString();
                    }
                    document.getElementById(id).innerText = display;
                };

                setVal('bpm', data.bpm);
                setVal('steps', data.steps);
                setVal('calories', data.calories, true);
                setVal('resting', data.resting, true);
                
                if (data.sleep1 && data.sleep2) {
                    const start = parseMyDate(data.sleep1);
                    const end = parseMyDate(data.sleep2);
                    if (start && end) {
                        let diffH = (end - start) / (1000 * 60 * 60);
                        if (diffH < 0) diffH += 24; 
                        document.getElementById('sleep').innerText = diffH.toFixed(1);
                    }
                } else {
                    setVal('sleep', data.sleep);
                }
                
                if (data.date) {
                    const d = parseMyDate(data.date);
                    document.getElementById('time').innerText = "実行時刻: " + (d ? d.toLocaleString('ja-JP') : data.date);
                }
            } catch (e) {
                document.getElementById('debug').innerText = "読み込み中...";
            }
        }

        update();
        setInterval(update, 30000); 
    </script>
</body>
</html>
