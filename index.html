<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ちゃいんの活動ステータス</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --discord-color: #5865F2;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3436;
            --text-sub: #636e72;
            --bpm-red: #ff4757;
            --steps-green: #2ed573;
            --cal-orange: #ffa502;
            --sleep-blue: #3742fa;
            --msg-bg: #f1f2f6;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        body { 
            background: var(--bg-gradient); 
            display: flex; align-items: center; justify-content: center; 
            color: var(--text-main); 
        }

        .container { width: 90%; max-width: 380px; max-height: 95vh; display: flex; flex-direction: column; justify-content: center; }
        h1 { color: white; font-size: 1.2rem; margin: 0 0 15px 0; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.2); text-align: center; }

        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 28px; box-shadow: 0 20px 40px -12px rgba(0,0,0,0.3); backdrop-filter: blur(10px); overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .stat-box { background: #ffffff; padding: 12px 8px; border-radius: 20px; border: 1px solid #edf2f7; text-align: center; }
        .label { font-size: 0.7rem; color: var(--text-sub); display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 4px; font-weight: 600; }
        .value { font-size: 1.4rem; font-weight: 800; display: block; }
        .unit { font-size: 0.65rem; color: #a0aec0; }

        .bpm-box { grid-column: span 2; padding: 15px 10px; background: linear-gradient(to bottom right, #fffafa, #fff5f6); }
        .bpm-box .value { color: var(--bpm-red); font-size: 3rem; line-height: 1.1; }

        .heart-icon { display: inline-block; animation: pulse 1.2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }

        .steps-box .value { color: var(--steps-green); }
        .cal-box .value { color: var(--cal-orange); }

        .sleep-box { grid-column: span 2; background: linear-gradient(to bottom right, #f8faff, #f0f3ff); }
        .sleep-box .value { color: var(--sleep-blue); font-size: 1.6rem; }
        .sleep-range { font-size: 0.75rem; color: var(--text-sub); font-weight: 700; margin-bottom: 2px; }
        .unit-inline { font-size: 0.8rem; margin: 0 2px; color: var(--sleep-blue); font-weight: 600; }

        .my-message-area {
            margin-top: 15px; padding: 12px; background: var(--msg-bg); border-radius: 15px;
            display: none; border-left: 4px solid var(--discord-color);
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .my-message-text { font-size: 0.85rem; line-height: 1.5; color: var(--text-main); white-space: pre-wrap; }

        .input-group { margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .input-field {
            width: 100%; padding: 10px 12px; border: 2px solid #edf2f7; border-radius: 12px;
            font-size: 0.85rem; box-sizing: border-box; outline: none; transition: all 0.3s;
            font-family: inherit; margin-bottom: 8px;
        }
        .input-field:focus { border-color: var(--discord-color); background: white; }
        textarea.input-field { resize: none; height: 50px; }
        .field-label { font-size: 0.65rem; color: var(--text-sub); margin: 0 0 4px 5px; display: block; font-weight: 700; }

        .btn-container { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .action-btn {
            width: 100%; padding: 12px; border: none; border-radius: 18px; 
            font-size: 0.9rem; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;
        }
        .notify-btn { background: var(--discord-color); color: white; box-shadow: 0 8px 15px rgba(88, 101, 242, 0.3); }
        .msg-view-btn { background: #747d8c; color: white; }
        
        .action-btn:active { transform: scale(0.96); opacity: 0.9; }
        .action-btn:disabled { background: #b2bec3; box-shadow: none; cursor: not-allowed; }

        #time { color: #a0aec0; font-size: 0.7rem; margin-top: 15px; padding-top: 10px; border-top: 1px solid #f1f2f6; text-align: center; }
        .error-log { color: #ff4757; font-size: 0.65rem; text-align: center; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ちゃいんの活動ステータス</h1>
        <div class="card">
            <div class="grid">
                <div class="stat-box bpm-box">
                    <span class="label"><span class="heart-icon">💓</span> 心拍数</span>
                    <span id="bpm" class="value">--</span>
                    <span class="unit">BPM</span>
                </div>
                <div class="stat-box steps-box">
                    <span class="label">👟 歩数</span>
                    <span id="steps" class="value">--</span>
                    <span class="unit">歩</span>
                </div>
                <div class="stat-box cal-box">
                    <span class="label">🔥 燃焼</span>
                    <span id="calories" class="value">--</span>
                    <span class="unit">kcal</span>
                </div>
                <div class="stat-box sleep-box">
                    <span class="label">😴 睡眠</span>
                    <div id="sleep-range" class="sleep-range">--:-- 〜 --:--</div>
                    <span id="sleep" class="value">--</span>
                </div>
            </div>

            <div id="myMessageArea" class="my-message-area">
                <span class="field-label" style="margin-left:0; color:var(--discord-color)">FROM ちゃいん</span>
                <div id="myMessageText" class="my-message-text">メッセージを取得中...</div>
            </div>

            <div class="btn-container">
                <button id="viewMsgBtn" class="action-btn msg-view-btn" onclick="toggleMyMessage()">
                    💬 メッセージを見る
                </button>
            </div>

            <div class="input-group">
                <label class="field-label">名前 (任意)</label>
                <input type="text" id="userName" class="input-field" placeholder="名無しさん">
                
                <label class="field-label">メッセージ (任意)</label>
                <textarea id="userMsg" class="input-field" placeholder="メッセージ"></textarea>
                
                <label class="field-label">🔑 認証パスワード (必須)</label>
                <input type="password" id="secretPass" class="input-field" placeholder="パスワードを入力してください">
                
                <button id="notifyBtn" class="action-btn notify-btn" onclick="sendDiscordNotification()">
                    <span>🔔</span> 叩き起こす
                </button>
            </div>

            <div id="time">更新待ち...</div>
            <div id="debug" class="error-log"></div>
        </div>
    </div>

    <script>
        const part1 = "Rm_mZy9B5N-DEFTElE2rUiG0awvFBJk6oXb9Kxufic09LSvd5g5du17Kgzej-RvnV6Ur";
        const part2 = "https://discord.com/api/webhooks/1498284030922326086/";
        const MY_DISCORD_ID = '922776570597376012'; 

        const CORRECT_PASSWORD = '1234';

        let currentMyMessage = "パスワードはDiscordのDM(n_n_e_)で教えます";

        // メッセージの表示・非表示切り替え
        function toggleMyMessage() {
            const area = document.getElementById('myMessageArea');
            const btn = document.getElementById('viewMsgBtn');
            if (area.style.display === 'none' || area.style.display === '') {
                area.style.display = 'block';
                btn.innerText = "✖ メッセージを閉じる";
            } else {
                area.style.display = 'none';
                btn.innerText = "💬 メッセージを見る";
            }
        }

        async function sendDiscordNotification() {
            const btn = document.getElementById('notifyBtn');
            const nameField = document.getElementById('userName');
            const msgField = document.getElementById('userMsg');
            const passField = document.getElementById('secretPass');
            
            const senderName = nameField.value.trim() || "名無しさん";
            const message = msgField.value.trim() || "（メッセージなし）";
            const inputPass = passField.value.trim();

            // パスワードの簡易チェック
            if (inputPass !== CORRECT_PASSWORD) {
                alert("パスワードが正しくありません。");
                passField.value = "";
                passField.focus();
                return;
            }
            
            btn.disabled = true;
            btn.innerText = "送信中...";
            
            const bpm = document.getElementById('bpm').innerText;
            const content = `📢 **${senderName}** からの通知！\n「${message}」\n\n<@${MY_DISCORD_ID}> 叩き起こされました！ (現在の心拍数: ${bpm} BPM)`;

            try {
                const response = await fetch(part2 + part1, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });
                if (response.ok) {
                    btn.innerText = "✅ 送信完了";
                    msgField.value = "";
                    passField.value = ""; // 送信成功時にパスワード欄をクリア
                    setTimeout(() => { btn.disabled = false; btn.innerText = "🔔 叩き起こす"; }, 3000);
                } else { throw new Error(); }
            } catch (e) {
                alert("送信に失敗しました。");
                btn.disabled = false;
                btn.innerText = "🔔 叩き起こす";
            }
        }

        function parseMyDate(dateStr) {
            if (!dateStr || typeof dateStr !== 'string') return null;
            let s = dateStr.includes('/') ? dateStr.replace(/(\d+)\/(\d+)\/(\d+)/, '20$3/$1/$2') : dateStr;
            let d = new Date(s);
            return isNaN(d.getTime()) ? null : d;
        }

        function formatTime(date) {
            if (!date) return "--:--";
            return date.getHours().toString().padStart(2, '0') + ":" + 
                   date.getMinutes().toString().padStart(2, '0');
        }

        async function update() {
            try {
                const res = await fetch('./data.json?' + new Date().getTime());
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                const setVal = (id, val, isRound = false) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    let display = "--";
                    if (val !== undefined && val !== null && val !== "") {
                        display = isRound ? Math.round(val) : val;
                        if (id === 'steps') display = Number(val).toLocaleString();
                    }
                    el.innerText = display;
                };

                setVal('bpm', data.bpm);
                setVal('steps', data.steps);
                setVal('calories', data.calories, true);

                // メッセージの更新
                if (data.message) {
                    currentMyMessage = data.message;
                    document.getElementById('myMessageText').innerText = currentMyMessage;
                }

                if (data.bpm > 0) {
                    document.querySelector('.heart-icon').style.animationDuration = `${60 / data.bpm}s`;
                }
                
                if (data.sleep1 && data.sleep2) {
                    const start = parseMyDate(data.sleep1);
                    const end = parseMyDate(data.sleep2);
                    if (start && end) {
                        document.getElementById('sleep-range').innerText = `${formatTime(start)} 〜 ${formatTime(end)}`;
                        let diffMs = end - start;
                        if (diffMs < 0) diffMs += 86400000; 
                        const totalMin = Math.floor(diffMs / 60000);
                        document.getElementById('sleep').innerHTML = 
                            `${Math.floor(totalMin / 60)}<span class="unit-inline">時間</span>${totalMin % 60}<span class="unit-inline">分</span>`;
                    }
                } else {
                    document.getElementById('sleep-range').innerText = "時刻データなし";
                    setVal('sleep', data.sleep);
                }
                
                if (data.date) {
                    const d = parseMyDate(data.date);
                    document.getElementById('time').innerText = "最終更新: " + (d ? d.toLocaleString('ja-JP') : data.date);
                }
                document.getElementById('debug').innerText = "";
            } catch (e) {
                document.getElementById('debug').innerText = "データ取得中...";
            }
        }

        update();
        setInterval(update, 30000); 
    </script>
</body>
</html>
