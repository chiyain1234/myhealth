<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Heart Rate</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 20px; display: inline-block; margin-top: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #bpm { font-size: 4rem; color: #ff4757; font-weight: bold; }
        #time { color: #747d8c; }
    </style>
</head>
<body>
    <div class="card">
        <h1>現在の心拍数</h1>
        <div id="bpm">--</div>
        <p>BPM</p>
        <div id="time">更新待ち...</div>
    </div>
    <script>
        async function update() {
            // 同じフォルダにある data.json を読みに行く
            const res = await fetch('./data.json?' + new Date().getTime());
            const data = await res.json();
            document.getElementById('bpm').innerText = data.bpm;
            document.getElementById('time').innerText = new Date(data.time).toLocaleString('ja-JP');
        }
        update();
        setInterval(update, 30000); // 30秒ごとに画面を更新
    </script>
</body>
</html>
